<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Raspberry Pi Control Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.5em;
        }

        .container {
            margin-top: 50px;
        }

        .button {
            display: inline-block;
            margin: 20px;
            padding: 20px 40px;
            font-size: 1.2em;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .on {
            background-color: #2ecc71;
            color: white;
        }

        .on:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        .off {
            background-color: #e74c3c;
            color: white;
        }

        .off:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .status {
            margin-top: 30px;
            font-size: 1.2em;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>⚡ Raspberry Pi Control</h1>

    <div class="container">
        <button class="button on" onclick="stuur('on')">LED AAN</button>
        <button class="button off" onclick="stuur('off')">LED UIT</button>
    </div>

    <div class="status" id="status">
        Status: onbekend
    </div>

    <script>
        const SERVER_URL = "http://JOUW-IP-OF-NGROK-URL:5000/led";

        function stuur(status) {
            fetch(SERVER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ status: status })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("status").innerText =
                    "Status: " + status.toUpperCase();
            })
            .catch(error => {
                document.getElementById("status").innerText =
                    "FOUT: geen verbinding";
                console.error(error);
            });
        }
    </script>

</body>
</html>
